<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Instructors – Admin | Talaga University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/portal.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<aside class="sidebar admin-sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-crest" style="background:linear-gradient(160deg,#e05555 0%,#9a2020 100%)"><i class="fa-solid fa-shield-halved"></i></div><div class="sb-text"><div class="sb-univ">Talaga University</div><div class="sb-sub" style="color:#e05555">Admin Panel</div></div></div>
  <nav class="sb-nav">
    <div class="nav-section">Management</div>
    <a href="dashboard.html"     class="nav-item" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
    <a href="students.html"      class="nav-item" data-page="students"><i class="fa-solid fa-users"></i><span>Students</span></a>
    <a href="instructors.html"   class="nav-item active" data-page="instructors"><i class="fa-solid fa-chalkboard-user"></i><span>Instructors</span></a>
    <a href="courses.html"       class="nav-item" data-page="courses"><i class="fa-solid fa-book-open"></i><span>Courses</span></a>
    <div class="nav-section">Academic</div>
    <a href="grades.html"        class="nav-item" data-page="grades"><i class="fa-solid fa-chart-line"></i><span>Grades</span></a>
    <a href="announcements.html" class="nav-item" data-page="announcements"><i class="fa-solid fa-bullhorn"></i><span>Announcements</span></a>
  </nav>
  <div class="sb-foot">
    <div class="sb-user"><div class="sb-avatar" id="sb-avatar">A</div><div class="sb-user-info"><div class="sb-user-name" id="sb-name">Administrator</div><div class="sb-user-role" style="color:#e05555">Admin</div></div></div>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i><span>Sign Out</span></button>
  </div>
</aside>
<div class="mobile-top"><button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button><span class="mob-brand">TU Admin</span><div class="mob-av" id="mob-av">A</div></div>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<main class="main">
  <div class="pg-header">
    <div><div class="pg-eyebrow" style="color:#e05555">Faculty Records</div><h1 class="pg-title">Instructor Management</h1></div>
    <button class="btn btn-gold" onclick="openCreate()"><i class="fa-solid fa-user-plus"></i> Add Instructor</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="search" placeholder="Search by name, email, or employee ID…" oninput="filterList()"></div>
      <div class="filter-row">
        <select class="flt-select" id="dept-filter" onchange="filterList()">
          <option value="">All Departments</option>
          <option>Computer Science</option><option>Mathematics</option>
          <option>English</option><option>Physical Education</option>
          <option>Engineering</option><option>Business</option>
        </select>
        <span id="count" style="font-size:13px;color:var(--text-m)"></span>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Instructor</th><th>Employee ID</th><th>Department</th><th>Designation</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-m)"><i class="fa-solid fa-spinner fa-spin"></i></td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Create / Edit Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title" id="modal-title">Add Instructor</span><button class="modal-close" onclick="closeModal('modal')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="frow">
        <div class="fgroup"><label>First Name *</label><input type="text" id="f-firstname" placeholder="Juan"></div>
        <div class="fgroup"><label>Last Name *</label><input type="text" id="f-lastname" placeholder="dela Cruz"></div>
        <div class="fgroup full"><label>Email Address *</label><input type="email" id="f-email" placeholder="instructor@talaga.edu.ph"></div>
        <div class="fgroup"><label>Department</label><input type="text" id="f-dept" placeholder="Computer Science"></div>
        <div class="fgroup"><label>Designation</label><input type="text" id="f-designation" placeholder="Professor / Instructor"></div>
        <div class="fgroup full"><label>Specialization</label><input type="text" id="f-spec" placeholder="Data Structures, Algorithms"></div>
        <div class="fgroup"><label>Contact Number</label><input type="text" id="f-contact" placeholder="09XXXXXXXXX"></div>
        <div class="fgroup" id="status-row" style="display:none"><label>Status</label>
          <select id="f-active"><option value="true">Active</option><option value="false">Inactive</option></select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('modal')">Cancel</button>
      <button class="btn btn-gold" id="save-btn" onclick="save()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
    </div>
  </div>
</div>

<script src="../js/portal.js"></script>
<script>
const e=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'—';
let all=[];

(async()=>{
  requireAdmin();
  await load();
})();

async function load(){
  const res = await apiFetch('/instructors');
  if(!res?.ok) return showToast('Failed to load','error');
  all = res.data.instructors||[];
  document.getElementById('count').textContent=`${all.length} instructor(s)`;
  filter();
}

function filterList(){ filter(); }
function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const d=document.getElementById('dept-filter').value;
  const list=all.filter(i=>{
    const txt=`${i.firstName} ${i.lastName} ${i.email} ${i.employeeId||''}`.toLowerCase();
    return(!q||txt.includes(q))&&(!d||i.department===d);
  });
  document.getElementById('count').textContent=`${list.length}/${all.length} instructor(s)`;
  render(list);
}

function render(list){
  const tb=document.getElementById('tbody');
  if(!list.length){tb.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--text-m)">No instructors found.</td></tr>`;return;}
  tb.innerHTML=list.map(i=>`<tr>
    <td><strong>${e(i.firstName)} ${e(i.lastName)}</strong><div class="sub">${e(i.email)}</div></td>
    <td><span class="badge bg-gold">${e(i.employeeId)||'—'}</span></td>
    <td>${e(i.department)||'—'}</td>
    <td>${e(i.designation)||'—'}</td>
    <td><span class="badge ${i.isActive?'bg-green':'bg-red'}">${i.isActive?'Active':'Inactive'}</span></td>
    <td><div style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick='openEdit(${JSON.stringify(i)})'><i class="fa-solid fa-pen"></i></button>
      <button class="btn btn-danger btn-sm" onclick="toggle('${i._id}','${e(i.firstName)}',${i.isActive})"><i class="fa-solid fa-${i.isActive?'ban':'circle-check'}"></i></button>
    </div></td>
  </tr>`).join('');
}

function openCreate(){
  document.getElementById('edit-id').value='';
  document.getElementById('modal-title').textContent='Add Instructor';
  ['f-firstname','f-lastname','f-email','f-dept','f-designation','f-spec','f-contact'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('status-row').style.display='none';
  openModal('modal');
}

function openEdit(i){
  document.getElementById('edit-id').value       = i._id;
  document.getElementById('modal-title').textContent='Edit Instructor';
  document.getElementById('f-firstname').value   = i.firstName||'';
  document.getElementById('f-lastname').value    = i.lastName||'';
  document.getElementById('f-email').value       = i.email||'';
  document.getElementById('f-dept').value        = i.department||'';
  document.getElementById('f-designation').value = i.designation||'';
  document.getElementById('f-spec').value        = i.specialization||'';
  document.getElementById('f-contact').value     = i.contactNumber||'';
  document.getElementById('f-active').value      = String(i.isActive);
  document.getElementById('status-row').style.display='';
  openModal('modal');
}

async function save(){
  const id=document.getElementById('edit-id').value;
  const fn=document.getElementById('f-firstname').value.trim();
  const ln=document.getElementById('f-lastname').value.trim();
  const em=document.getElementById('f-email').value.trim();
  if(!fn||!ln||!em) return showToast('First name, last name and email are required.','error');
  const body={firstName:fn,lastName:ln,email:em,
    department:document.getElementById('f-dept').value.trim(),
    designation:document.getElementById('f-designation').value.trim(),
    specialization:document.getElementById('f-spec').value.trim(),
    contactNumber:document.getElementById('f-contact').value.trim()};
  if(id) body.isActive=document.getElementById('f-active').value==='true';
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving…';
  const res=id?await apiFetch(`/instructors/${id}`,{method:'PUT',body:JSON.stringify(body)}):await apiFetch('/instructors',{method:'POST',body:JSON.stringify(body)});
  btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save';
  closeModal('modal');
  if(res?.ok){showToast(id?'Instructor updated.':'Instructor added.','success');await load();}
  else showToast(res?.data?.message||'Failed.','error');
}

async function toggle(id,name,current){
  const res=await apiFetch(`/instructors/${id}`,{method:'PUT',body:JSON.stringify({isActive:!current})});
  if(res?.ok){showToast(`${name} ${!current?'activated':'deactivated'}.`,'success');await load();}
  else showToast('Action failed.','error');
}
</script>
</body>
</html>
