<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Announcements – Talaga University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><div class="sb-crest"><i class="fa-solid fa-landmark-dome"></i></div><div class="sb-text"><div class="sb-univ">Talaga University</div><div class="sb-sub">Student Portal</div></div></div>
  <nav class="sb-nav">
    <a href="dashboard.html"     class="nav-item" data-page="dashboard"><i class="fa-solid fa-house-chimney"></i><span>Dashboard</span></a>
    <a href="courses.html"       class="nav-item" data-page="courses"><i class="fa-solid fa-book-open-reader"></i><span>My Courses</span></a>
    <a href="grades.html"        class="nav-item" data-page="grades"><i class="fa-solid fa-chart-line"></i><span>Grades</span></a>
    <a href="payments.html"      class="nav-item" data-page="payments"><i class="fa-solid fa-credit-card"></i><span>Payments</span></a>
    <a href="announcements.html" class="nav-item active" data-page="announcements"><i class="fa-solid fa-bullhorn"></i><span>Announcements</span></a>
    <a href="profile.html"       class="nav-item" data-page="profile"><i class="fa-solid fa-id-card"></i><span>My Profile</span></a>
  </nav>
  <div class="sb-foot">
    <div class="sb-user"><div class="sb-avatar" id="sb-avatar">--</div><div class="sb-user-info"><div class="sb-user-name" id="sb-name">Loading…</div><div class="sb-user-role" id="sb-role">Student</div></div></div>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i><span>Sign Out</span></button>
  </div>
</aside>
<div class="mobile-top"><button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button><span class="mob-brand">Talaga University</span><div class="mob-av" id="mob-av">--</div></div>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<main class="main">
  <div class="pg-header">
    <div>
      <div class="pg-eyebrow">University Updates</div>
      <h1 class="pg-title">Announcements</h1>
      <span style="font-size:13px;color:var(--text-m);margin-top:6px;display:block" id="ann-count"></span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <div class="search-box" style="max-width:220px">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="ann-search" placeholder="Search…" oninput="filterAnn()">
      </div>
      <select class="flt-select" id="type-filter" onchange="filterAnn()">
        <option value="">All Types</option>
        <option value="general">General</option>
        <option value="academic">Academic</option>
        <option value="payment">Payment</option>
        <option value="event">Event</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>
  </div>

  <div id="ann-container"><div style="text-align:center;padding:60px;color:var(--text-m)"><i class="fa-solid fa-spinner fa-spin" style="font-size:24px;margin-bottom:12px;display:block"></i>Loading announcements…</div></div>
</main>

<!-- Detail Modal -->
<div class="modal-bg" id="ann-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-hd">
      <span class="modal-title" id="ann-modal-title"></span>
      <button class="modal-close" onclick="closeModal('ann-modal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px" id="ann-modal-meta"></div>
      <div id="ann-modal-body" style="color:var(--text-b);line-height:1.85;font-size:14px;white-space:pre-wrap"></div>
    </div>
  </div>
</div>

<script src="js/portal.js"></script>
<script src="js/announcements.js"></script>
</body>
</html>
